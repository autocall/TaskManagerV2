<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Контур листа с вырезом под уголок -->
  <path d="M16 4 H96 L112 20 V124 H16 Z" fill="#ffffff" stroke="#9e9e9e" stroke-width="3" stroke-linejoin="round"></path>

  <!-- Загнутый уголок с таким же бордером -->
  <polygon points="96,4 112,20 96,20" fill="#f2f2f2" stroke="#9e9e9e" stroke-width="3" stroke-linejoin="round"></polygon>

  <!-- Солнце -->
  <circle cx="38" cy="40" r="10" fill="#ffd857"></circle>

  <!-- Горы -->
  <polygon points="16,84 44,56 68,80 92,44 112,84" fill="#ff8c4a"></polygon>

  <!-- Нижняя оранжевая плашка -->
  <rect x="16" y="84" width="96" height="40" fill="#ff6d3a"></rect>

  <!-- JFIF текст -->
  <text x="64" y="112" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#ffffff">
    JFIF
  </text>
</svg>
